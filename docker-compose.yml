# TripMate Agent 단일 호스트 Docker Compose 구성
# 서비스: rustfs(미디어 저장) / api(FastAPI) / mcp / scheduler / frontend(Next.js)
# api·mcp·scheduler는 같은 SQLite + SpatiaLite 데이터 볼륨을 공유한다.
# RustFS는 애플리케이션 컨테이너에 내장하지 않고 별도 서비스로 구동한다(ADR-15).

x-app-env-file: &app-env-file
  - path: .env
    required: false

x-python-env: &python-env
  DATABASE_URL: sqlite+aiosqlite:////data/tripmate.db
  SPATIALITE_EXTENSION_PATH: mod_spatialite
  NEXT_PUBLIC_API_BASE_URL: http://localhost:${API_HOST_PORT:-9041}
  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:${FRONTEND_HOST_PORT:-9042},http://127.0.0.1:${FRONTEND_HOST_PORT:-9042},http://localhost:13000,http://127.0.0.1:13000,http://localhost:13100,http://127.0.0.1:13100}
  RUSTFS_ENABLED: "true"
  # 컨테이너 간 통신은 Compose 서비스명과 RustFS 기본 내부 포트(9000)를 사용한다.
  RUSTFS_ENDPOINT: ${RUSTFS_DOCKER_ENDPOINT:-http://rustfs:9000}
  RUSTFS_PUBLIC_BASE_URL: ${RUSTFS_PUBLIC_BASE_URL:-http://127.0.0.1:9003/krtour-map}
  # 콘솔은 사용자가 호스트(또는 WSL2) 브라우저에서 여는 공개 URL이다.
  RUSTFS_CONSOLE_URL: http://127.0.0.1:9004
  RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
  RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
  RUSTFS_BUCKET_RAW_VIDEOS: ${RUSTFS_BUCKET_RAW_VIDEOS:-krtour-map}
  RUSTFS_BUCKET_SUBTITLES: ${RUSTFS_BUCKET_SUBTITLES:-krtour-map}
  RUSTFS_BUCKET_FRAMES: ${RUSTFS_BUCKET_FRAMES:-krtour-map}
  RUSTFS_OBJECT_PREFIX: ${RUSTFS_OBJECT_PREFIX:-features}
  RUSTFS_REGION: ${RUSTFS_REGION:-us-east-1}
  RUSTFS_HEALTH_PATH: /health/live
  MEDIA_RETENTION_POLICY: infinite
  # FFmpeg은 컨테이너 이미지(Dockerfile.python apt)가 /usr/bin/ffmpeg로 제공한다.
  FFMPEG_PATH: ${FFMPEG_PATH:-/usr/bin/ffmpeg}
  # 실행 환경 및 API 인증. 기본 local은 인증 코드 없이 동작한다. 외부에 노출할 때는
  # .env에 APP_ENV=production과 API_KEYS=<쉼표 구분 키>를 설정한다.
  APP_ENV: ${APP_ENV:-local}
  API_AUTH_ENABLED: ${API_AUTH_ENABLED:-false}
  API_KEYS: ${API_KEYS:-}

services:
  rustfs:
    # 별도 로컬 Docker RustFS 서비스. S3 API 9003, 콘솔 9004.
    image: rustfs/rustfs:latest
    ports:
      - "${RUSTFS_HOST_PORT:-9003}:9000"
      - "${RUSTFS_CONSOLE_HOST_PORT:-9004}:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs-data:/data
    command:
      - --console-enable
      - --access-key
      - ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - --secret-key
      - ${RUSTFS_SECRET_KEY:-rustfsadmin}
      - /data
    # 무기한 보존: lifecycle 만료 정책을 두지 않는다.

  api:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: *app-env-file
    ports:
      - "${API_HOST_PORT:-9041}:8000"
    volumes:
      - sqlite-data:/data
    environment:
      <<: *python-env
    depends_on:
      rustfs:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: python /app/mcp/server.py
    env_file: *app-env-file
    ports:
      - "${MCP_HOST_PORT:-8010}:8010"
    volumes:
      - sqlite-data:/data
    environment:
      <<: *python-env
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8010"
      MCP_STREAMABLE_HTTP_PATH: /mcp
    depends_on:
      api:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: python /app/scheduler/worker.py
    env_file: *app-env-file
    volumes:
      - sqlite-data:/data
    environment:
      <<: *python-env
    depends_on:
      api:
        condition: service_healthy
      rustfs:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    env_file: *app-env-file
    environment:
      # 브라우저는 same-origin BFF(`/api/v1/*` Route Handler)로 호출한다(상대 경로).
      # BFF가 서버 사이드에서 백엔드로 프록시하며 인증 코드를 주입하므로, 키는
      # 서버 전용 BACKEND_API_KEY로만 보관하고 브라우저에 노출하지 않는다(ADR-24).
      BACKEND_ORIGIN: http://api:8000
      BACKEND_API_KEY: ${BACKEND_API_KEY:-}
      NEXT_PUBLIC_VWORLD_SERVICE_KEY: ${NEXT_PUBLIC_VWORLD_SERVICE_KEY:-}
    ports:
      - "${FRONTEND_HOST_PORT:-9042}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  # SQLite + SpatiaLite 데이터 볼륨 (api/mcp/scheduler 공유)
  sqlite-data:
  # RustFS 객체 데이터 볼륨 (무기한 보존)
  rustfs-data:
