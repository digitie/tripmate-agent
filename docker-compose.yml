# KRTour AI Agent 단일 호스트 Docker Compose 구성
# 서비스: api(FastAPI) / mcp / scheduler / frontend(Next.js)
# api·mcp·scheduler는 같은 외부 PostgreSQL/PostGIS DB를 사용한다(ADR-25).
# RustFS는 고정 host port 12101/12105의 별도 Docker 서비스를 사용한다(ADR-15).

x-app-env-file: &app-env-file
  - path: .env
    required: false

x-python-env: &python-env
  DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://addr:addr@host.docker.internal:5432/krtour_ai_agent}
  NEXT_PUBLIC_API_BASE_URL: http://localhost:${API_HOST_PORT:-12401}
  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:${FRONTEND_HOST_PORT:-12405},http://127.0.0.1:${FRONTEND_HOST_PORT:-12405},http://localhost:3000,http://127.0.0.1:3000,http://localhost:13100,http://127.0.0.1:13100}
  RUSTFS_ENABLED: "true"
  # RustFS는 이 repo Compose 밖의 고정 Docker 서비스(12101/12105)를 사용한다.
  RUSTFS_ENDPOINT: ${RUSTFS_DOCKER_ENDPOINT:-http://host.docker.internal:12101}
  RUSTFS_PUBLIC_BASE_URL: ${RUSTFS_PUBLIC_BASE_URL:-http://127.0.0.1:12101/krtour-map}
  # 콘솔은 사용자가 호스트(또는 WSL2) 브라우저에서 여는 공개 URL이다.
  RUSTFS_CONSOLE_URL: http://127.0.0.1:12105
  RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
  RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
  RUSTFS_BUCKET_RAW_VIDEOS: ${RUSTFS_BUCKET_RAW_VIDEOS:-krtour-map}
  RUSTFS_BUCKET_SUBTITLES: ${RUSTFS_BUCKET_SUBTITLES:-krtour-map}
  RUSTFS_BUCKET_FRAMES: ${RUSTFS_BUCKET_FRAMES:-krtour-map}
  RUSTFS_OBJECT_PREFIX: ${RUSTFS_OBJECT_PREFIX:-features}
  RUSTFS_REGION: ${RUSTFS_REGION:-us-east-1}
  RUSTFS_HEALTH_PATH: /health/live
  MEDIA_RETENTION_POLICY: infinite
  # FFmpeg은 컨테이너 이미지(Dockerfile.python apt)가 /usr/bin/ffmpeg로 제공한다.
  FFMPEG_PATH: ${FFMPEG_PATH:-/usr/bin/ffmpeg}
  # 실행 환경 및 API 인증. 기본 local은 인증 코드 없이 동작한다. 외부에 노출할 때는
  # .env에 APP_ENV=production과 API_KEYS=<쉼표 구분 키>를 설정한다.
  APP_ENV: ${APP_ENV:-local}
  API_AUTH_ENABLED: ${API_AUTH_ENABLED:-false}
  API_KEYS: ${API_KEYS:-}

services:
  rustfs:
    # 선택형 내장 RustFS. 기본 실행에서는 기존 고정 RustFS(host 12101/12105)를 사용한다.
    # 필요할 때만 COMPOSE_PROFILES=embedded-rustfs 와 RUSTFS_DOCKER_ENDPOINT=http://rustfs:9000 으로 켠다.
    profiles: ["embedded-rustfs"]
    image: rustfs/rustfs:latest
    ports:
      - "${RUSTFS_HOST_PORT:-12101}:9000"
      - "${RUSTFS_CONSOLE_HOST_PORT:-12105}:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - rustfs-data:/data
    command:
      - --console-enable
      - --access-key
      - ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - --secret-key
      - ${RUSTFS_SECRET_KEY:-rustfsadmin}
      - /data
    # 무기한 보존: lifecycle 만료 정책을 두지 않는다.

  api:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: *app-env-file
    ports:
      - "${API_HOST_PORT:-12401}:8000"
    environment:
      <<: *python-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 15s

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: python /app/mcp/server.py
    env_file: *app-env-file
    ports:
      - "${MCP_HOST_PORT:-12402}:12402"
    environment:
      <<: *python-env
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "12402"
      MCP_STREAMABLE_HTTP_PATH: /mcp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.python
    command: python /app/scheduler/worker.py
    env_file: *app-env-file
    environment:
      <<: *python-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    env_file: *app-env-file
    environment:
      # 브라우저는 same-origin BFF(`/api/v1/*` Route Handler)로 호출한다(상대 경로).
      # BFF가 서버 사이드에서 백엔드로 프록시하며 인증 코드를 주입하므로, 키는
      # 서버 전용 BACKEND_API_KEY로만 보관하고 브라우저에 노출하지 않는다(ADR-24).
      BACKEND_ORIGIN: http://api:8000
      BACKEND_API_KEY: ${BACKEND_API_KEY:-}
      NEXT_PUBLIC_VWORLD_SERVICE_KEY: ${NEXT_PUBLIC_VWORLD_SERVICE_KEY:-}
    ports:
      - "${FRONTEND_HOST_PORT:-12405}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  # RustFS 객체 데이터 볼륨 (무기한 보존)
  rustfs-data:
